<!DOCTYPE html>
<html lang="es-MX" data-theme="light">

<head>

    <!-- ========================================================= -->
    <!-- CONFIGURACIÓN GENERAL -->
    <!-- ========================================================= -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>SalonDiEliss | By Elisa Torres</title>

    <!-- ========================================================= -->
    <!-- TEMA INICIAL -->
    <!-- ========================================================= -->

    <script>

        const savedTheme =
            localStorage.getItem(
                "salondieliss-theme"
            );

        const prefersDarkTheme =
            window.matchMedia(
                "(prefers-color-scheme: dark)"
            ).matches;

        const initialTheme =
            savedTheme || (prefersDarkTheme ? "dark" : "light");

        document.documentElement.setAttribute(
            "data-theme",
            initialTheme
        );

    </script>

    <!-- ========================================================= -->
    <!-- SEO -->
    <!-- ========================================================= -->

    <meta
        name="description"
        content="SalonDiEliss. Tu espacio favorito para consentirte, relajarte y realzar tu belleza."
    >

    <meta
        name="keywords"
        content="salón de belleza, estética, maquillaje, peinados, colorimetría, tratamientos capilares"
    >

    <meta
        name="author"
        content="SalonDiEliss"
    >

    <meta
        name="robots"
        content="index,follow"
    >

    <!-- ========================================================= -->
    <!-- OPEN GRAPH -->
    <!-- ========================================================= -->

    <meta
        property="og:type"
        content="website"
    >

    <meta
        property="og:title"
        content="SalonDiEliss"
    >

    <meta
        property="og:description"
        content="Tu espacio favorito para consentirte y realzar tu belleza."
    >

    <meta
        property="og:image"
        content="./assets/images/og-image.jpg"

    <!-- ========================================================= -->

    <!-- ========================================================= -->

    <meta

        content="#FDF9F8"
    >

    <!-- ========================================================= -->
    <!-- GOOGLE FONTS -->

    <!-- ========================================================= -->
    <!-- TAILWIND -->
    <!-- ========================================================= -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ========================================================= -->
    <!-- CONFIGURACIÓN PERSONALIZADA TAILWIND -->

    <script>

                            600: '#C99487',
                            700: '#AF7C6F'

                        }

                    }

            }

        }

    </script>

                >

        </section>

    </main>

    <!-- ========================================================= -->
    <!-- JAVASCRIPT -->

</body>

</html>
